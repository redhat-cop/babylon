---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "babylon.labels" $ | nindent 4 }}
    app.kubernetes.io/component: catalog-api
  name: babylon-catalog-api
rules:
- apiGroups:
  - ""
  - user.openshift.io
  resources:
  - groups
  - users
  verbs:
  - get
  - impersonate
  - list
- apiGroups:
  - ""
  resources:
  - namespaces
  - secrets
  verbs:
  - get
  - list
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - create
  - patch
  - update
- apiGroups:
  - babylon.gpte.redhat.com
  resources:
  - catalogitems
  verbs:
  - get
  - list
- apiGroups:
  - babylon.gpte.redhat.com
  resources:
  - selfpacedlabs
  - selfpacedlabitems
  verbs:
  - get
  - list
- apiGroups:
  - babylon.gpte.redhat.com
  resources:
  - selfpacedlabuserassignments
  verbs:
  - get
  - list
  - update
- apiGroups:
  - babylon.gpte.redhat.com
  resources:
  - workshopprovisions
  verbs:
  - get
  - list
  - patch
- apiGroups:
  - babylon.gpte.redhat.com
  resources:
  - workshops
  - workshopuserassignments
  - multiworkshops
  verbs:
  - get
  - list
  - patch
  - watch
  - update
- apiGroups:
  - {{ .Values.resourceBroker.api.group }}
  resources:
  - resourceclaims
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - {{ .Values.resourceBroker.api.group }}
  resources:
  - resourcehandles
  verbs:
  - get
  - list
