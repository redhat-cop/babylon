apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workshops.babylon.gpte.redhat.com
spec:
  conversion:
    strategy: None
  group: babylon.gpte.redhat.com
  names:
    kind: Workshop
    listKind: WorkshopList
    plural: workshops
    singular: workshop
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: >-
          Workshop definition which provides a user interface for unauthenticated users to access workshop services.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            properties:
              name:
                maxLength: 63
                pattern: ^[a-z0-9A-Z]([a-z0-9A-Z\-._]*[a-z0-9A-Z])?$
                type: string
            type: object
          spec:
            description: Specification of Workshop.
            type: object
            properties:
              accessPassword:
                description: >-
                  Optional password for access to the workshop.
                type: string
              actionSchedule:
                description: >-
                  Configuration for when services should start and stop to propagate to WorkshopProvisions that belong to this Workshop.
                  This configuration is only for Workshops that have WorkshopProvisions.
                  This configuration has no effect for Workshops that are owned by a ResourceClaim.
                type: object
                properties:
                  start:
                    description: >-
                      Time when services should start. If in the future then services should be stopped.
                    type: string
                    format: date-time
                  stop:
                    description: >-
                      Time when services should stop. If in the past then services should be stopped.
                    type: string
                    format: date-time
              description:
                description: >-
                  Description text for the workshop.
                type: string
              displayName:
                description: >-
                  Display name for the workshop.
                type: string
              labUserInterface:
                description: >-
                  Default settings for labUserInterface under userAssignments.
                type: object
                properties:
                  redirect:
                    description: >-
                      Configure that users should be automatically redirected to the lab user interface.
                    type: boolean
              lifespan:
                description: >-
                  Lifespan settings for this Workshop.
                  This configuration is meant for Workshops that have WorkshopProvisions.
                  Lifespan for Workshops owned by a ResourceClaim should be managed through the owning ResourceClaim.
                type: object
                properties:
                  end:
                    description: >-
                      End of lifespan for Workshop any WorkshopProvisions that belong to it.
                    type: string
                    format: date-time
                  start:
                    description: >-
                      Start of lifespan for Workshop any WorkshopProvisions that belong to it.
                    type: string
                    format: date-time
                  readyBy:
                    description: >-
                      Target date and time when the Workshop should be ready for use.
                      Provisioning will be scheduled to complete before this time.
                    type: string
                    format: date-time
                  maximum:
                    description: >-
                      Maximum lifespan which may be requested for a workshop relative to its creation.
                    type: string
                    pattern: ^[0-9]+[dhms]$
                  relativeMaximum:
                    description: >-
                      Maximum lifespan which may be requested for a workshop relative to the present date and time.
                    type: string
                    pattern: ^[0-9]+[dhms]$
              multiuserServices:
                description: >-
                  Flag to indicate that services for this workshop are multi-user.
                type: boolean
                default: false
              openRegistration:
                description: >-
                  If set to true then users will not need to be pre-registered.
                type: boolean
                default: false
              provisionDisabled:
                description: >-
                  If set then WorkshopProvisions are disabled for this Workshop.
                  This is appropriate to set when a multi-user workshop environment is provisioned first and then a Workshop is created later to provide access only.
                  In this case the Workshop should also be set to be owned by the ResourceClaim for the service.
                type: boolean
                default: false
              seatsOnDemand:
                description: >-
                  Configuration for on-demand seat provisioning. When configured, no instances are
                  pre-provisioned at workshop creation. Instead, each seat is provisioned individually
                  when a user attends the workshop. Seats are short-lived and expire after the
                  configured duration. A dedicated ResourcePool is created for this workshop and
                  destroyed when the workshop is deleted.
                type: object
                required:
                - seatExpiration
                - resourcePool
                properties:
                  seatExpiration:
                    description: >-
                      Duration for how long each on-demand seat should live after it is provisioned.
                    type: string
                    pattern: ^[0-9]+[dhms]$
                  resourcePool:
                    description: >-
                      Configuration for the dedicated ResourcePool to be created for this workshop.
                      This pool is used exclusively by this workshop and will be destroyed when the
                      workshop is deleted.
                    type: object
                    required:
                    - provider
                    properties:
                      name:
                        description: >-
                          Name of the dedicated ResourcePool to create in the poolboy namespace.
                          If not specified, a name will be generated from the workshop name.
                        type: string
                      provider:
                        description: >-
                          Reference to the ResourceProvider that will be used to provision resources
                          for on-demand seats.
                        type: object
                        required:
                        - name
                        - namespace
                        properties:
                          apiVersion:
                            description: >-
                              API version of the ResourceProvider.
                            type: string
                            default: poolboy.gpte.redhat.com/v1
                          kind:
                            description: >-
                              Kind of the resource provider reference.
                            type: string
                            default: ResourceProvider
                          name:
                            description: >-
                              Name of the ResourceProvider.
                            type: string
                          namespace:
                            description: >-
                              Namespace of the ResourceProvider.
                            type: string
                      minAvailable:
                        description: >-
                          Minimum number of pre-provisioned resources to keep available in the pool
                          for faster seat assignment. Default is 0, meaning purely on-demand with no
                          pre-warming.
                        type: integer
                        default: 0
                        minimum: 0
          status:
            description: Status of Workshop
            type: object
            x-kubernetes-preserve-unknown-fields: true
            properties:
              diffBase:
                description: Kopf diffbase
                type: string
              provisionCount:
                type: object
                properties:
                  ordered:
                    description: Total number of ordered provisions.
                    type: integer
                  failed:
                    description: Number of provisions that have failed.
                    type: integer
                  active:
                    description: Number of provisions that are active.
                    type: integer
                  retries:
                    description: Number of provisions retries.
                    type: integer
              resourcePool:
                description: >-
                  Status of the dedicated ResourcePool created for on-demand seats.
                  Populated by the operator when seatsOnDemand is configured.
                type: object
                properties:
                  name:
                    description: >-
                      Name of the created ResourcePool.
                    type: string
                  namespace:
                    description: >-
                      Namespace of the created ResourcePool.
                    type: string
                  uid:
                    description: >-
                      UID of the created ResourcePool resource.
                    type: string
              resourceClaims:
                description: >-
                  References to ResourceClaims associated with this Workshop.
                type: object
                additionalProperties:
                  type: object
                  properties:
                    uid:
                      type: string
              userAssignments:
                description: >-
                  References to WorkshopUserAssignments.
                type: object
                additionalProperties:
                  type: object
                  properties:
                    assignment:
                      description: >-
                        Assignment for workshop participant.
                      type: object
                      required:
                      - email
                      properties:
                        email:
                          description: >-
                            Email address used to identify workshop participant.
                          type: string
                    resourceClaimName:
                      description: >-
                        ResourceClaim name.
                      type: string
                    userName:
                      description: >-
                        User name for lab as reported from the service provisioning.
                      type: string
              userCount:
                type: object
                properties:
                  assigned:
                    description: Assigned users for workshop.
                    type: integer
                  available:
                    description: Available user assignments for workshop.
                    type: integer
                  total:
                    description: Total user assignments for workshop.
                    type: integer
              workshopProvisions:
                description: >-
                  References to WorkshopProvisions associated with this Workshop.
                type: object
                additionalProperties:
                  type: object
                  properties:
                    uid:
                      type: string
              workshopURL:
                description: >-
                  URL for accessing this workshop. Constructed from the
                  WORKSHOP_BASE_URL environment variable and the workshop-id label.
                  If WORKSHOP_BASE_URL is not set, the URL is relative (e.g. /workshop/abc123).
                type: string
        required:
        - apiVersion
        - kind
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
