apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: selfpacedlabitems.babylon.gpte.redhat.com
spec:
  conversion:
    strategy: None
  group: babylon.gpte.redhat.com
  names:
    kind: SelfPacedLabItem
    listKind: SelfPacedLabItemList
    plural: selfpacedlabitems
    singular: selfpacedlabitem
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: >-
          Item configuration for a self-paced lab. Maintains a warm pool of
          ResourceClaims that auto-replenishes as users claim instances.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            properties:
              name:
                maxLength: 63
                pattern: ^[a-z0-9A-Z]([a-z0-9A-Z\-._]*[a-z0-9A-Z])?$
                type: string
            type: object
          spec:
            description: >-
              Specification of SelfPacedLabItem.
            type: object
            required:
            - assignedLifespan
            - catalogItem
            - poolSize
            - unassignedLifespan
            - selfPacedLabName
            properties:
              assignedLifespan:
                description: >-
                  How long a ResourceClaim should live once assigned to a user (i.e. the user's
                  session duration). After this time the ResourceClaim is destroyed.
                  Format is a duration string, e.g. "4h", "1d", "8h".
                type: string
                pattern: ^[0-9]+[dhms]$
              catalogItem:
                description: >-
                  CatalogItem for the self-paced lab.
                type: object
                required:
                - name
                - namespace
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
              concurrency:
                description: >-
                  Maximum number of concurrent provisions when replenishing the pool.
                  Default: poolSize.
                type: integer
                minimum: 1
              parameters:
                description: >-
                  Parameter values to use with catalog item provisioning.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              poolSize:
                description: >-
                  Number of unused ResourceClaims to keep ready in the warm pool at all times.
                  When a user claims an instance, a new one is provisioned to maintain this count.
                type: integer
                minimum: 1
              selfPacedLabName:
                description: >-
                  SelfPacedLab name reference.
                type: string
              startDelay:
                description: >-
                  Number of seconds to delay between starting provisions to prevent flooding the provisioning infrastructure.
                  Default: 10.
                type: integer
                minimum: 1
              unassignedLifespan:
                description: >-
                  How long an unassigned ResourceClaim should live before being destroyed and replaced
                  with a fresh instance. This prevents stale environments from accumulating.
                  Format is a duration string, e.g. "24h", "2d", "30m".
                type: string
                pattern: ^[0-9]+[dhms]$
          status:
            description: Status of SelfPacedLabItem
            type: object
            x-kubernetes-preserve-unknown-fields: true
            properties:
              diffBase:
                description: Kopf diffbase
                type: string
              readyCount:
                description: Number of unassigned ResourceClaims ready for users.
                type: integer
              provisioningCount:
                description: Number of ResourceClaims currently being provisioned.
                type: integer
              assignedCount:
                description: Number of ResourceClaims assigned to users.
                type: integer
              failedCount:
                description: Number of ResourceClaims that have failed provisioning.
                type: integer
        required:
        - apiVersion
        - kind
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
