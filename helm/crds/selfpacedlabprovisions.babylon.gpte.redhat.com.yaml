apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: selfpacedlabprovisions.babylon.gpte.redhat.com
spec:
  conversion:
    strategy: None
  group: babylon.gpte.redhat.com
  names:
    kind: SelfPacedLabProvision
    listKind: SelfPacedLabProvisionList
    plural: selfpacedlabprovisions
    singular: selfpacedlabprovision
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: >-
          Provision configuration for a self-paced lab. Maintains a warm pool of
          ResourceClaims that auto-replenishes as users claim instances.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            properties:
              name:
                maxLength: 63
                pattern: ^[a-z0-9A-Z]([a-z0-9A-Z\-._]*[a-z0-9A-Z])?$
                type: string
            type: object
          spec:
            description: >-
              Specification of SelfPacedLabProvision.
            type: object
            required:
            - catalogItem
            - poolSize
            - unclaimedLifespan
            - selfPacedLabName
            properties:
              autoDetach:
                description: |
                  Configuration for auto-detach of the ResourceClaim.
                type: object
                properties:
                  when:
                    description: >
                      Condition to check that is transferred to the ResourceClaim
                      that belongs to this SelfPacedLabProvision which triggers detach of
                      ResourceHandle from the ResourceClaim.

                      Condition is given in Jinja2 syntax similar to ansible
                      "when" clauses.
                    type: string
              catalogItem:
                description: >-
                  CatalogItem for the self-paced lab.
                type: object
                required:
                - name
                - namespace
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
              concurrency:
                description: >-
                  Maximum number of concurrent provisions when replenishing the pool.
                  Default: poolSize.
                type: integer
                minimum: 1
              lifespan:
                description: >-
                  Lifespan settings for this self-paced lab provision.
                type: object
                properties:
                  end:
                    description: >-
                      End of lifespan for self-paced lab provision and provisioned ResourceClaims.
                    type: string
                    format: date-time
                  start:
                    description: >-
                      Scheduled start for provisioning to begin for self-paced lab.
                    type: string
                    format: date-time
              parameters:
                description: >-
                  Parameter values to use with catalog item provisioning.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              poolSize:
                description: >-
                  Number of unclaimed ResourceClaims to keep ready in the warm pool at all times.
                  When a user claims an instance, a new one is provisioned to maintain this count.
                type: integer
                minimum: 1
              resourcePool:
                description: >-
                  Resource pool name for assigning ResourceClaims. Set to "disabled" to explicitly
                  disable pool assignment. If not set, no pool annotation is created on ResourceClaims.
                type: string
              selfPacedLabName:
                description: >-
                  SelfPacedLab name reference.
                type: string
              startDelay:
                description: >-
                  Number of seconds to delay between starting provisions to prevent flooding the provisioning infrastructure.
                  Default: 10.
                type: integer
                minimum: 1
              unclaimedLifespan:
                description: >-
                  How long an unclaimed ResourceClaim should live before being destroyed and replaced
                  with a fresh instance. This prevents stale environments from accumulating.
                  Format is a duration string, e.g. "24h", "2d", "30m".
                type: string
                pattern: ^[0-9]+[dhms]$
          status:
            description: Status of SelfPacedLabProvision
            type: object
            x-kubernetes-preserve-unknown-fields: true
            properties:
              diffBase:
                description: Kopf diffbase
                type: string
              resourceClaimCount:
                description: Total number of ResourceClaims managed by this provision.
                type: integer
              readyCount:
                description: Number of unclaimed ResourceClaims ready for users.
                type: integer
              provisioningCount:
                description: Number of ResourceClaims currently being provisioned.
                type: integer
              assignedCount:
                description: Number of ResourceClaims assigned to users.
                type: integer
              failedCount:
                description: Number of ResourceClaims that have failed provisioning.
                type: integer
              recycledCount:
                description: Total number of ResourceClaims recycled due to unclaimed lifespan expiry.
                type: integer
        required:
        - apiVersion
        - kind
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
